name: Backend Pytest

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-pytest.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-pytest.yml'
  workflow_dispatch:

concurrency:
  group: backend-pytest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: test-secret-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run backend tests
        run: python -m pytest tests -q --cov=features --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Upload coverage HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 30

      - name: Upload coverage XML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          retention-days: 30
